<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aragvarord — Driving School App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      color: #888;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    a {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    a:hover {
      color: #f0f0f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Արագվարord</h1>
    <p>Practice driving theory and simulations to prepare for your Armenian driving exam.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
